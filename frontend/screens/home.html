<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home – Abrigo</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-home">

<header>
    <span id="saudacao" style="font-size:14px;color:#aaa;"></span>
    <div>
        <button id="btnCadastrarAnimal" class="hidden" onclick="window.location.href='cadastrar-animal.html'">+ Cadastrar Animal</button>
        <button class="perfil-btn" onclick="window.location.href='perfil.html'">Perfil</button>
    </div>
</header>

<main>
    <h1>Animais disponíveis para adoção</h1>

    <div class="filtros">
        <select id="filtroEspecie">
            <option value="">Todas as espécies</option>
            <option value="cao">Cachorro</option>
            <option value="gato">Gato</option>
            <option value="ave">Ave</option>
            <option value="roedor">Roedor</option>
            <option value="reptil">Réptil</option>
            <option value="outro">Outro</option>
        </select>
        <button onclick="renderizar()">Filtrar</button>
    </div>

    <div id="secao-filhotes">
        <p class="secao-titulo">Filhotes</p>
        <div class="grid-animais" id="grid-filhotes"></div>
    </div>

    <div id="secao-jovens">
        <p class="secao-titulo">Jovens</p>
        <div class="grid-animais" id="grid-jovens"></div>
    </div>

    <div id="secao-adultos">
        <p class="secao-titulo">Adultos</p>
        <div class="grid-animais" id="grid-adultos"></div>
    </div>

    <div id="secao-idosos">
        <p class="secao-titulo">Idosos</p>
        <div class="grid-animais" id="grid-idosos"></div>
    </div>
</main>

<script src="../js/dados.js"></script>
<script src="../js/home.js"></script>
</body>
</html>
