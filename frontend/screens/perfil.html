<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Yggdrasil – Perfil</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-perfil">
    <button class="btn-voltar-perfil" onclick="window.location.href='home.html'">← Voltar</button>
    <div class="perfil-overlay">
        <div class="perfil-card">
            <div class="perfil-foto-wrap" onclick="document.getElementById('inputFotoPerfil').click()" title="Alterar foto">
                <img id="avatarImg" class="perfil-foto-img" alt="Foto de perfil">
                <div id="avatarPlaceholder" class="perfil-foto-placeholder">
                    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" width="44" height="44">
                        <circle cx="24" cy="18" r="9"/>
                        <path d="M6 44c0-9.94 8.06-18 18-18s18 8.06 18 18"/>
                    </svg>
                </div>
                <div class="perfil-foto-overlay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" width="20" height="20">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                    </svg>
                    <span>Alterar foto</span>
                </div>
                <input type="file" id="inputFotoPerfil" accept="image/*">
            </div>
            <div id="tipoBadge" class="perfil-badge-tipo"></div>
            <h1 id="perfilNome" class="perfil-nome"></h1>
            <div class="perfil-divider"></div>
            <div class="perfil-infos">
                <div class="perfil-info-item"><span class="pi-label">Email</span><span class="pi-valor" id="pEmail"></span></div>
                <div class="perfil-info-item"><span class="pi-label">Telefone</span><span class="pi-valor" id="pTelefone"></span></div>
                <div class="perfil-info-item"><span class="pi-label">Endereço</span><span class="pi-valor" id="pEndereco"></span></div>
            </div>
            <div id="secaoInteresses" style="display:none; width:100%">
                <div class="perfil-divider"></div>
                <p class="perfil-sec-titulo">Minhas solicitações</p>
                <div id="listaInteresses" class="perfil-interesses"></div>
            </div>
            <div class="perfil-divider"></div>
            <button class="perfil-btn-sair" onclick="sair()">Sair da conta</button>
        </div>
    </div>
<script src="../js/dados.js"></script>
<script src="../js/perfil.js"></script>
</body>
</html>
